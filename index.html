<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スポットマップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        /* 画面全体に地図を表示 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        /* ポップアップ内のスタイル調整 */
        .popup-content {
            max-width: 250px;
        }
        .popup-content h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
            color: #333;
        }
        .popup-content img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            margin-bottom: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        .popup-content p {
            margin: 0;
            font-size: 13px;
            color: #666;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        // 1. 地図の初期化 (初期表示位置は兵庫県加東市周辺に設定)
        const map = L.map('map').setView([34.894, 135.075], 13);

        // 2. 背景地図タイルの読み込み (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 3. JSONデータを読み込んでピン（マーカー）を配置
        fetch('spot_parsed.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`JSONの読み込みに失敗しました (Status: ${response.status})`);
                }
                return response.json();
            })
            .then(spots => {
                const markers = [];

                spots.forEach(spot => {
                    // 緯度経度の安全な取得とバリデーション
                    if (!spot.geo || !Array.isArray(spot.geo) || spot.geo.length < 2) {
                        console.warn('位置情報が不正なスポットをスキップしました:', spot);
                        return; // 該当スポットのみスキップして処理を継続
                    }

                    const [lat, lng] = spot.geo; // 分割代入でスマートに取得

                    // ポップアップに表示するHTMLを構築
                    const popupHTML = `
                        <div class="popup-content">
                            <h3>${spot.title || '無題のスポット'}</h3>
                            <img src="${spot.img || ''}" alt="${spot.title || ''}" onerror="this.onerror=null; this.src='https://placehold.co/250x150?text=No+Image';">
                            <p>${spot.description || ''}</p>
                        </div>
                    `;

                    // マーカーを作成して地図に追加
                    const marker = L.marker([lat, lng])
                        .bindPopup(popupHTML)
                        .addTo(map);

                    markers.push(marker);
                });

                // すべてのピンが画面に収まるように自動で地図のズーム・位置を調整
                if (markers.length > 0) {
                    const group = new L.featureGroup(markers);
                    map.fitBounds(group.getBounds().pad(0.1));
                }
            })
            .catch(error => {
                console.error('エラーが発生しました:', error);
                alert('データの読み込み中にエラーが発生しました。詳細はコンソールを確認してください。');
            });
    </script>
</body>
</html>
