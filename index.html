<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exif Photo Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        #map {
            width: 100%;
            height: 100vh; /* 画面いっぱいに地図を表示 */
        }
        /* ポップアップ内の画像スタイル */
        .popup-img {
            max-width: 200px;
            max-height: 150px;
            display: block;
            margin-top: 5px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js"></script>

    <script>
        // 1. 地図の初期化 (初期表示として日本全体が見えるように設定)
        const map = L.map('map').setView([36.0, 137.0], 5);

        // OpenStreetMapの背景地図タイルを読み込む
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 2. 解析対象とする画像ファイル名のリスト
        // ※ photo/ フォルダ内にある画像の名前をここに書き加えてください
        const imageFiles = [
            '001.jpg',
            '002.jpg',
            '003.jpg'
        ];

        // 3. 各画像を読み込んでExifから位置情報を取得し、マーカーを設置する関数
        async function loadImagesOnMap() {
            const markers = [];

            for (const fileName of imageFiles) {
                const imagePath = `photo/${fileName}`;

                try {
                    // exifr を使って画像から緯度・経度を取得
                    const gps = await exifr.gps(imagePath);

                    if (gps && gps.latitude && gps.longitude) {
                        const { latitude, longitude } = gps;

                        // 地図上にマーカーを設置
                        const marker = L.marker([latitude, longitude]).addTo(map);

                        // マーカーをクリックしたときに表示されるポップアップを登録
                        // 画像をクリックすると、別タブで元画像が開くようにリンク化しています
                        const popupContent = `
                            <div>
                                <strong>${fileName}</strong><br>
                                <a href="${imagePath}" target="_blank">
                                    <img src="${imagePath}" class="popup-img" alt="${fileName}">
                                </a>
                            </div>
                        `;
                        marker.bindPopup(popupContent);
                        markers.push(marker);
                    } else {
                        console.warn(`位置情報が見つかりません: ${fileName}`);
                    }
                } catch (error) {
                    console.error(`画像の解析に失敗しました: ${fileName}`, error);
                }
            }

            // マーカーが1つ以上あれば、すべてのマーカーが画面に収まるように自動で地図のズームを調整
            if (markers.length > 0) {
                const group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }

        // 実行
        loadImagesOnMap();
    </script>
</body>
</html>
